<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Bill</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:15px;
    background:#f5f5f5;
}

.bill{
    max-width:500px;
    margin:auto;
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

th, td{
    border-bottom:1px solid #ddd;
    padding:8px;
    text-align:left;
}

th{
    background:#f0f0f0;
}

.total{
    text-align:right;
    font-weight:bold;
    padding-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    font-size:16px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:active{
    background:#1e7e34;
}

button:disabled{
    background:#ccc;
    cursor:not-allowed;
}

/* Hide button when printing */
@media print{
    button{
        display:none;
    }
    body{
        background:white;
    }
}
</style>
</head>

<body>

<div class="bill">

<h2>Grocery Bill</h2>

<table>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
</tr>

<tr>
<td>Rice</td>
<td>2</td>
<td>$4.00</td>
</tr>

<tr>
<td>Milk</td>
<td>1</td>
<td>$1.50</td>
</tr>

<tr>
<td>Bread</td>
<td>1</td>
<td>$2.00</td>
</tr>

<tr>
<td>Eggs</td>
<td>12</td>
<td>$3.00</td>
</tr>

</table>

<div class="total">
Total: $10.50
</div>

<button onclick="window.printPageViaPrinter()">Print Bill via BLE Printer</button>

</div>

<script>
// Print bill content only (without button)
window.printPageViaPrinter = function() {
    var billContent = document.querySelector('.bill');
    
    if (window.ReactNativeWebView) {
        // Extract only bill HTML (without button) for React Native
        var billHTML = '<h2>' + billContent.querySelector('h2').textContent + '</h2>' +
                       billContent.querySelector('table').outerHTML +
                       billContent.querySelector('.total').outerHTML;
        
        window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'PRINT_REQUEST',
            html: billHTML
        }));
        alert('Print request sent to app!');
    } else {
        // Browser print - open print dialog with only bill content
        var printWindow = window.open('', '', 'height=600,width=800');
        printWindow.document.write('<!DOCTYPE html>');
        printWindow.document.write('<html><head><title>Grocery Bill</title>');
        printWindow.document.write('<style>');
        printWindow.document.write('body { font-family: Arial, sans-serif; margin: 20px; background: white; }');
        printWindow.document.write('h2 { text-align: center; margin-bottom: 20px; }');
        printWindow.document.write('table { width: 100%; border-collapse: collapse; }');
        printWindow.document.write('th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }');
        printWindow.document.write('th { background: #f0f0f0; }');
        printWindow.document.write('.total { text-align: right; font-weight: bold; margin-top: 15px; }');
        printWindow.document.write('</style></head><body>');
        printWindow.document.write(billContent.innerHTML.replace(/<button[\s\S]*?<\/button>/g, ''));
        printWindow.document.write('</body></html>');
        printWindow.document.close();
        printWindow.print();
    }
};
</script>

</body>
</html>
